spring:
  application:
    name: education-service

  datasource:
    url: jdbc:postgresql://postgres:5432/education_db
    username: ${DB_USERNAME:education_user}
    password: ${DB_PASSWORD:education_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_schema: public
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/v1/changelog-master.yml
    enabled: true
    drop-first: false
    default-schema: public
    parameters:
      tablePrefix: ""

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    display-request-duration: true
    filter: true
    show-actuator: true
    doc-expansion: none
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true
  show-actuator: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  use-fqn: false
  writer-with-default-prettify: true
  remove-broken-reference-definitions: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    root: INFO
    org.urfu: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    liquibase: INFO

  file:
    name: /app/logs/application.log

  logback:
    rollingpolicy:
      max-history: 7
      max-file-size: 10MB
      total-size-cap: 100MB
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"